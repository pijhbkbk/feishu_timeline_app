# Root-domain placeholder for future portal / navigation / landing page.
# This file intentionally does not proxy to the timeline project.

server {
    listen 80;
    listen [::]:80;
    server_name www.all-too-well.com;

    return 301 http://all-too-well.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name all-too-well.com;

    access_log /var/log/nginx/all-too-well.com.access.log;
    error_log /var/log/nginx/all-too-well.com.error.log warn;

    root /var/www/all-too-well-placeholder;
    index index.html;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location / {
        try_files $uri $uri/ /index.html =404;
    }
}

